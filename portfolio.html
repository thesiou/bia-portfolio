<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portfolio — Lunaart / Bianca Banu</title>

  <meta name="description" content="My portfolio: character design, visual storytelling, illustration and animation." />
  <meta property="og:title"       content="Work — Lunaart / Bianca Banu" />
  <meta property="og:description" content="My portfolio: character design, visual storytelling, illustration and animation." />
  <meta property="og:image"       content="https://www.lunaart.net/images/illustration/3.jpeg" />
  <link rel="canonical" href="https://www.lunaart.net/portfolio.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css?v=20260330-9" />
</head>
<body id="page-portfolio">

  <!-- Intro overlay — shown on first visit, fades away to reveal portfolio -->
  <div id="intro-overlay" aria-hidden="true">
    <div class="intro-piece intro-piece-1">
      <div class="intro-piece-inner">
        <video autoplay loop muted playsinline src="images/animation/animation1.mp4"></video>
      </div>
    </div>
    <div class="intro-piece intro-piece-2">
      <div class="intro-piece-inner">
        <img src="images/characters/1.jpeg" alt="" loading="eager" />
      </div>
    </div>
    <div class="intro-piece intro-piece-3">
      <div class="intro-piece-inner">
        <img src="images/otherfunstuff/storyboards:comics/comics1.jpg" alt="" loading="eager" />
      </div>
    </div>
    <div class="intro-piece intro-piece-4">
      <div class="intro-piece-inner">
        <img src="images/illustration/3.jpeg" alt="" loading="eager" />
      </div>
    </div>
    <div class="intro-piece intro-piece-5">
      <div class="intro-piece-inner">
        <img src="images/characters/3.jpeg" alt="" loading="eager" />
      </div>
    </div>
    <div id="intro-name">
      <span id="intro-name-text">Bianca Banu</span>
      <span id="intro-name-role">Character Design &amp; Illustration</span>
    </div>
  </div>

  <!-- Nav bar: logo left · tabs center · arrows flank tabs on mobile -->
  <nav id="portfolio-nav">
    <div id="nav-tabs" role="tablist" aria-label="Categories"></div>
    <button id="nav-prev" class="side-nav" aria-label="Previous category" disabled>
      <svg width="20" height="20" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3 5.5 8 10 13" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="nav-next" class="side-nav" aria-label="Next category">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6 3l4.5 5L6 13" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <!-- Carousel -->
  <div id="portfolio-container">
    <div id="slides-track"></div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" hidden>
    <p>Work coming soon.</p>
  </div>

  <!-- Portfolio lightbox -->
  <div id="portfolio-lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button id="portfolio-lb-close" aria-label="Close">&#x2715;</button>
    <div id="portfolio-lb-media"></div>
    <a id="portfolio-lb-details" href="#" hidden>
      Project Details
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
    </a>
  </div>

  <script src="data/artworks-loader.js"></script>
  <script src="script.js?v=20260330-9"></script>
</body>
</html>
