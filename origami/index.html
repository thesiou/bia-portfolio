<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Origami Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="admin.css?v=20260418-1" />
</head>
<body>
  <main class="admin-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Lunaart Admin</p>
        <h1>Origami</h1>
      </div>
      <div class="session-block">
        <span id="session-label">Checking session...</span>
        <button id="logout-btn" class="btn ghost" type="button" hidden>Log out</button>
      </div>
    </header>

    <section id="auth-panel" class="panel" hidden>
      <h2>Authentication required</h2>
      <p>Sign in with GitHub to edit portfolio content.</p>
      <a class="btn" href="/origami-api/auth/login">Sign in</a>
    </section>

    <section id="editor-panel" class="panel" hidden>
      <div class="toolbar">
        <label>
          Collection
          <select id="collection-select"></select>
        </label>
        <button id="add-piece-btn" class="btn" type="button">+ Add piece</button>
        <button id="save-btn" class="btn primary" type="button">Save changes</button>
      </div>

      <p id="change-indicator" class="change-indicator up-to-date" role="status">Up to date</p>
      <p id="editor-status" class="status" role="status"></p>

      <details class="advanced-box commit-box">
        <summary>Advanced: commit message</summary>
        <label class="commit-wrap">
          <input id="commit-message" type="text" maxlength="120" placeholder="chore(admin): update portfolio content" />
        </label>
      </details>

      <div id="pieces-list" class="pieces-list"></div>
    </section>

    <section id="upload-panel" class="panel" hidden>
      <details class="advanced-box">
        <summary>Advanced: standalone upload tool</summary>
        <p class="muted">Most artists can ignore this. Main upload flow is via the Add piece / Replace image buttons.</p>
        <form id="upload-form" class="upload-grid">
          <label>
            Folder path
            <input id="upload-folder" type="text" value="images/uploads" required />
          </label>
          <label>
            File
            <input id="upload-file" type="file" required />
          </label>
          <label class="check-line">
            <input id="upload-optimize" type="checkbox" checked />
            <span>Optimize image upload (WebP, high quality)</span>
          </label>
          <label>
            Max side (px)
            <input id="upload-max-side" type="number" min="800" max="5000" step="100" value="2560" />
          </label>
          <label>
            Quality (0.6-1)
            <input id="upload-quality" type="number" min="0.6" max="1" step="0.01" value="0.88" />
          </label>
          <button class="btn" type="submit">Upload file</button>
        </form>
        <p id="upload-status" class="status" role="status"></p>
        <div class="upload-result-row">
          <code id="upload-result" class="upload-result"></code>
          <button id="copy-upload-path" class="btn tiny" type="button" hidden>Copy path</button>
        </div>
      </details>
    </section>
  </main>

  <template id="piece-card-template">
    <article class="piece-card">
      <div class="piece-head">
        <div class="piece-head-left">
          <strong class="piece-index"></strong>
          <label class="check-line piece-active-wrap">
            <input class="piece-active" type="checkbox" checked />
            <span>Visible on site</span>
          </label>
        </div>
        <div class="piece-actions">
          <button class="btn tiny move-up" type="button">↑ Up</button>
          <button class="btn tiny move-down" type="button">↓ Down</button>
          <button class="btn tiny danger remove-piece" type="button">Remove</button>
        </div>
      </div>

      <div class="piece-body">
        <div class="piece-preview-wrap">
          <div class="piece-preview"></div>
          <button class="btn tiny replace-image-btn" type="button">Replace image</button>
        </div>
        <div class="piece-main-fields">
          <label>
            Title <span class="field-hint">(optional)</span>
            <input class="piece-title" type="text" placeholder="Leave blank to hide title" />
          </label>
          <label>
            Year <span class="field-hint">(optional)</span>
            <input class="piece-year" type="text" placeholder="e.g. 2025" />
          </label>
          <label>
            Description <span class="field-hint">(optional)</span>
            <textarea class="piece-description" rows="3" placeholder="Add a short description for this piece…"></textarea>
          </label>
        </div>
      </div>

      <section class="detail-editor">
        <div class="detail-head">
          <strong>Detail page images</strong>
          <div class="detail-head-actions">
            <button class="btn tiny add-detail-item" type="button">+ Add detail image</button>
          </div>
        </div>
        <div class="details-list"></div>
      </section>
    </article>
  </template>

  <template id="detail-item-template">
    <div class="detail-item">
      <div class="detail-preview"></div>
      <div class="detail-fields">
        <label>
          Caption <span class="field-hint">(optional)</span>
          <input class="detail-caption" type="text" placeholder="Add a caption…" />
        </label>
      </div>
      <div class="detail-actions">
        <button class="btn tiny detail-up" type="button">↑</button>
        <button class="btn tiny detail-down" type="button">↓</button>
        <button class="btn tiny danger detail-remove" type="button">Remove</button>
      </div>
    </div>
  </template>

  <input id="add-piece-file-input" type="file" hidden accept="image/*,video/*" />
  <input id="add-detail-file-input" type="file" hidden accept="image/*,video/*" />
  <input id="replace-image-file-input" type="file" hidden accept="image/*,video/*" />

  <script src="admin.js?v=20260418-1"></script>
</body>
</html>
