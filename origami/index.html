<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Origami Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="admin-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Lunaart Admin</p>
        <h1>Origami</h1>
      </div>
      <div class="session-block">
        <span id="session-label">Checking session...</span>
        <button id="logout-btn" class="btn ghost" type="button" hidden>Log out</button>
      </div>
    </header>

    <section id="auth-panel" class="panel" hidden>
      <h2>Authentication required</h2>
      <p>Sign in with GitHub to edit portfolio content.</p>
      <a class="btn" href="/origami-api/auth/login">Sign in</a>
    </section>

    <section id="editor-panel" class="panel" hidden>
      <div class="toolbar">
        <label>
          Collection
          <select id="collection-select"></select>
        </label>
        <button id="add-piece-btn" class="btn" type="button">Add piece</button>
        <button id="save-btn" class="btn primary" type="button">Save changes</button>
      </div>

      <label class="commit-wrap">
        Commit message
        <input id="commit-message" type="text" maxlength="120" placeholder="chore(admin): update portfolio content" />
      </label>

      <p id="change-indicator" class="change-indicator up-to-date" role="status">Up to date</p>
      <p id="editor-status" class="status" role="status"></p>

      <div id="pieces-list" class="pieces-list"></div>
    </section>

    <section id="upload-panel" class="panel" hidden>
      <h2>Upload media</h2>
      <p class="muted">Upload a file and reuse the returned `images/...` path in either main piece media or detail media.</p>
      <form id="upload-form" class="upload-grid">
        <label>
          Folder path
          <input id="upload-folder" type="text" value="images/uploads" required />
        </label>
        <label>
          File
          <input id="upload-file" type="file" required />
        </label>
        <label class="check-line">
          <input id="upload-optimize" type="checkbox" checked />
          <span>Optimize image upload (WebP, high quality)</span>
        </label>
        <label>
          Max side (px)
          <input id="upload-max-side" type="number" min="800" max="5000" step="100" value="2560" />
        </label>
        <label>
          Quality (0.6-1)
          <input id="upload-quality" type="number" min="0.6" max="1" step="0.01" value="0.88" />
        </label>
        <button class="btn" type="submit">Upload file</button>
      </form>
      <p id="upload-status" class="status" role="status"></p>
      <div class="upload-result-row">
        <code id="upload-result" class="upload-result"></code>
        <button id="copy-upload-path" class="btn tiny" type="button" hidden>Copy path</button>
      </div>
    </section>
  </main>

  <template id="piece-card-template">
    <article class="piece-card">
      <div class="piece-head">
        <strong class="piece-index"></strong>
        <div class="piece-actions">
          <button class="btn tiny move-up" type="button">Up</button>
          <button class="btn tiny move-down" type="button">Down</button>
          <button class="btn tiny danger remove-piece" type="button">Remove</button>
        </div>
      </div>

      <div class="piece-body">
        <div class="piece-preview"></div>
        <div class="piece-main-fields">
          <label class="check-line">
            <input class="piece-active" type="checkbox" checked />
            <span>Active (visible on site)</span>
          </label>
          <label>
            Title (optional)
            <input class="piece-title" type="text" />
          </label>
          <label>
            Main image/video path
            <input class="piece-main-image" type="text" placeholder="images/..." />
          </label>
        </div>
      </div>

      <section class="detail-editor">
        <div class="detail-head">
          <strong>Detail page media</strong>
          <button class="btn tiny add-detail-item" type="button">Add detail media</button>
        </div>
        <div class="details-list"></div>
      </section>
    </article>
  </template>

  <template id="detail-item-template">
    <div class="detail-item">
      <div class="detail-preview"></div>
      <div class="detail-fields">
        <label>
          Media path
          <input class="detail-src" type="text" placeholder="images/..." />
        </label>
        <label>
          Caption (optional)
          <input class="detail-caption" type="text" />
        </label>
      </div>
      <div class="detail-actions">
        <button class="btn tiny detail-up" type="button">Up</button>
        <button class="btn tiny detail-down" type="button">Down</button>
        <button class="btn tiny danger detail-remove" type="button">Remove</button>
      </div>
    </div>
  </template>

  <div id="media-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="media-modal-title">
      <div class="modal-head">
        <h2 id="media-modal-title">Add media</h2>
        <button id="media-modal-close" class="btn tiny ghost" type="button" aria-label="Close">Close</button>
      </div>

      <p id="media-modal-context" class="muted"></p>

      <div class="modal-grid">
        <div class="modal-preview-wrap">
          <div id="media-modal-preview" class="piece-preview"></div>
        </div>
        <div class="modal-fields">
          <label>
            Media path
            <input id="media-modal-path" type="text" placeholder="images/..." />
          </label>
          <label id="media-modal-caption-wrap" hidden>
            Caption (optional)
            <input id="media-modal-caption" type="text" />
          </label>
          <label>
            Folder path
            <input id="media-modal-folder" type="text" value="images/uploads" />
          </label>
          <label>
            Select file
            <input id="media-modal-file" type="file" />
          </label>
          <label class="check-line">
            <input id="media-modal-optimize" type="checkbox" checked />
            <span>Optimize image upload (WebP, high quality)</span>
          </label>
          <label>
            Max side (px)
            <input id="media-modal-max-side" type="number" min="800" max="5000" step="100" value="2560" />
          </label>
          <label>
            Quality (0.6-1)
            <input id="media-modal-quality" type="number" min="0.6" max="1" step="0.01" value="0.88" />
          </label>
          <p id="media-modal-status" class="status" role="status"></p>
        </div>
      </div>

      <div class="modal-actions">
        <button id="media-modal-upload-btn" class="btn" type="button">Upload and use</button>
        <button id="media-modal-confirm-btn" class="btn primary" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <script src="admin.js?v=20260330-3"></script>
</body>
</html>
