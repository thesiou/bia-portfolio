<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Bianca Banu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body id="page-piece">

  <nav id="piece-nav">
    <a href="portfolio.html" id="piece-back">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="piece-back-label">Work</span>
    </a>
    <a href="index.html" id="piece-home">
      <img src="logo.png" id="piece-nav-logo" alt="Bianca Banu" />
      Bianca Banu
    </a>
  </nav>

  <!-- Hero image -->
  <div id="piece-hero">
    <img id="piece-img-bg" src="" alt="" aria-hidden="true" />
    <img id="piece-img"    src="" alt="" />
  </div>

  <!-- Info + process -->
  <div id="piece-content">

    <header id="piece-header">
      <div id="piece-header-left">
        <span id="piece-category"></span>
        <h1 id="piece-title"></h1>
      </div>
      <div id="piece-header-right">
        <span id="piece-year"></span>
        <span id="piece-software"></span>
      </div>
    </header>

    <p id="piece-description"></p>

    <div id="piece-detail-images"></div>

    <!-- Prev / next within category -->
    <nav id="piece-sibling-nav">
      <button id="piece-prev" class="piece-sibling-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 3 5.5 8 10 13" stroke="currentColor" stroke-width="1.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Previous
      </button>
      <a href="portfolio.html" id="piece-back-grid">
        All <span id="piece-sibling-category"></span>
      </a>
      <button id="piece-next" class="piece-sibling-btn">
        Next
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M6 3l4.5 5L6 13" stroke="currentColor" stroke-width="1.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </nav>

  </div>

  <script src="data/artworks.js"></script>
  <script src="script.js"></script>
</body>
</html>
