<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Work</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css?v=20260330-12" />
</head>
<body id="page-piece">

  <nav id="piece-nav">
    <a href="portfolio.html" id="piece-back">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="piece-back-label">Back</span>
    </a>
  </nav>

  <!-- Hero image -->
  <div id="piece-hero">
    <img id="piece-img-bg" src="" alt="" aria-hidden="true" />
    <img id="piece-img"    src="" alt="" />
  </div>


  <!-- Info + process -->
  <div id="piece-content">

    <header id="piece-header">
      <div id="piece-header-left">
        <span id="piece-category"></span>
        <h1 id="piece-title"></h1>
      </div>
      <div id="piece-header-right">
        <span id="piece-year"></span>
        <span id="piece-software"></span>
      </div>
    </header>

    <p id="piece-description"></p>

    <div id="piece-detail-images"></div>

    <nav id="piece-sibling-nav">
      <a id="piece-prev" class="piece-sibling-btn">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="piece-prev-label"></span>
      </a>
      <a id="piece-back-grid" href="portfolio.html">
        <span id="piece-sibling-category"></span>
      </a>
      <a id="piece-next" class="piece-sibling-btn">
        <span id="piece-next-label"></span>
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M7 4.5 11.5 9 7 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </nav>

    <a id="piece-back-bottom" href="portfolio.html">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="piece-back-bottom-label">Back</span>
    </a>

  </div>


  <!-- Site footer — populated from siteText in artworks.json via script.js -->
  <footer id="site-footer"></footer>

  <!-- Edge navigation arrows -->
  <a id="piece-nav-prev" class="piece-edge-nav" aria-label="Previous piece">
    <svg width="20" height="20" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <a id="piece-nav-next" class="piece-edge-nav" aria-label="Next piece">
    <svg width="20" height="20" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M7 4.5 11.5 9 7 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <script src="data/artworks-loader.js"></script>
  <script src="script.js?v=20260330-13"></script>
</body>
</html>
