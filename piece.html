<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Bianca Banu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body id="page-piece">

  <nav id="piece-nav">
    <a href="portfolio.html" id="piece-back">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="piece-back-label">Work</span>
    </a>
  </nav>

  <!-- Hero image -->
  <div id="piece-hero">
    <img id="piece-img-bg" src="" alt="" aria-hidden="true" />
    <img id="piece-img"    src="" alt="" />
  </div>

  <!-- Expand / contain toggle (hidden on landscape) -->
  <button id="piece-expand-btn" aria-label="Toggle full width" hidden>
    <span class="expand-expand">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" aria-hidden="true">
        <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9"/>
      </svg>
      Full width
    </span>
    <span class="expand-compress">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" aria-hidden="true">
        <path d="M5 1v4H1M13 5H9V1M9 13v-4h4M1 9h4v4"/>
      </svg>
      Contain
    </span>
  </button>

  <!-- Info + process -->
  <div id="piece-content">

    <header id="piece-header">
      <div id="piece-header-left">
        <span id="piece-category"></span>
        <h1 id="piece-title"></h1>
      </div>
      <div id="piece-header-right">
        <span id="piece-year"></span>
        <span id="piece-software"></span>
      </div>
    </header>

    <p id="piece-description"></p>

    <div id="piece-detail-images"></div>

  </div>

  <!-- Lightbox (subcategory image zoom) -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button id="lightbox-close" aria-label="Close">&#x2715;</button>
    <img src="" alt="" />
  </div>

  <script src="data/artworks.js"></script>
  <script src="script.js"></script>
</body>
</html>
