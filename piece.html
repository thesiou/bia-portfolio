<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Work — Bianca Banu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body id="page-piece">

  <nav id="piece-nav">

              stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hero image -->
  <div id="piece-hero">
    <img id="piece-img-bg" src="" alt="" aria-hidden="true" />
    <img id="piece-img"    src="" alt="" />
  </div>


  <!-- Info + process -->

    <header id="piece-header">
      <div id="piece-header-left">
        <span id="piece-category"></span>
        <h1 id="piece-title"></h1>
      </div>
      <div id="piece-header-right">
        <span id="piece-year"></span>
        <span id="piece-software"></span>
      </div>
    </header>

    <p id="piece-description"></p>

    <div id="piece-detail-images"></div>

    <nav id="piece-sibling-nav">
      <a id="piece-prev" class="piece-sibling-btn">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="piece-prev-label"></span>
      </a>
      <a id="piece-back-grid" href="portfolio.html">
        <span id="piece-sibling-category"></span>
      </a>
      <a id="piece-next" class="piece-sibling-btn">

          <path d="M7 4.5 11.5 9 7 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </nav>

    <a id="piece-back-bottom" href="portfolio.html">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M11 4.5 6.5 9 11 13.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="piece-back-bottom-label">Back</span>
    </a>

  </div>

    <a href="https://linktr.ee/lunaarts" target="_blank" rel="noopener noreferrer" class="footer-brand">
      <img src="logo.png" alt="" class="footer-brand-logo" aria-hidden="true" />
      <span class="footer-brand-name">Bianca Banu</span>
    </a>
    <div class="footer-icons">
      <a href="https://www.instagram.com/luna_being_productive" target="_blank" rel="noopener noreferrer" aria-label="Instagram">

      </a>
      <a href="https://www.behance.net/lunaarts" target="_blank" rel="noopener noreferrer" aria-label="Behance">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h6a3.5 3.5 0 0 1 0 7H5V4z"/><path d="M5 11h7a4 4 0 0 1 0 8H5V11z"/><line x1="14.5" y1="7" x2="20" y2="7"/></svg>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>

  <!-- Edge navigation arrows -->
  <a id="piece-nav-prev" class="piece-edge-nav" aria-label="Previous piece">
